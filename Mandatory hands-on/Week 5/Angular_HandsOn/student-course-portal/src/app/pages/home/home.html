<h1>{{ portalName }}</h1>

<p>
  Manage your courses, enroll in new subjects and monitor your academic progress.
</p>

<button
    [disabled]="!isPortalActive"
    (click)="onEnrollClick()">

    Enroll Now

</button>

<p>{{ message }}</p>

<hr>

<input
    type="text"
    [(ngModel)]="searchTerm"
    placeholder="Search courses">

<p>Searching for: {{ searchTerm }}</p>

<hr>

<div>
    <p><strong>Courses Available:</strong> 12</p>
    <p><strong>Enrolled:</strong> 3</p>
    <p><strong>GPA:</strong> 3.8</p>
</div>
